# =============================================
# Development / verification profile
# Uses H2 in-memory DB + local Redis
# =============================================

spring.datasource.url=\
  jdbc:h2:mem:auditdb;\
  DB_CLOSE_DELAY=-1;\
  DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=\
  org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=\
  org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.redis.host=\
  ${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.database=0

app.dirs.incoming=\
  ${DOC_INCOMING:/data/incoming-docs}
app.dirs.processed=\
  ${DOC_PROCESSED:/data/processed}
app.dirs.reports=\
  ${DOC_REPORTS:/data/reports}
app.dirs.locks=\
  ${DOC_LOCKS:/data/locks}
app.dirs.nfs-incoming=\
  ${DOC_NFS:/data/nfs-incoming}

compliance.soap.url=\
  ${COMPLIANCE_URL:\
  http://localhost:8081\
  /compliance-api/v1/validate}

app.native.lib-path=/usr/local/lib

logging.level.com.ubs.docpipeline=DEBUG
logging.level.org.apache.camel=INFO

server.port=8443
