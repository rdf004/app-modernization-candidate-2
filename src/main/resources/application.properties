# =========================================
# UBS Document Processing Pipeline
# RHEL deployment configuration
# =========================================

server.port=8443
spring.application.name=\
  doc-processing-pipeline

# -----------------------------------------
# Oracle Audit Database
# -----------------------------------------
spring.datasource.url=\
  jdbc:oracle:thin:@\
  ${oracle.host:ora-auditdb-01.internal}\
  :${oracle.port:1521}\
  :${oracle.sid:UBSAUDIT}
spring.datasource.username=\
  ${oracle.username:doc_pipeline}
spring.datasource.password=\
  ${ORACLE_DB_PASSWORD:}
spring.datasource.driver-class-name=\
  oracle.jdbc.OracleDriver
spring.jpa.database-platform=\
  org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate

# -----------------------------------------
# H2 fallback for local development
# Activate: --spring.profiles.active=dev
# -----------------------------------------
# spring.datasource.url=jdbc:h2:mem:auditdb
# spring.datasource.driver-class-name=\
#   org.h2.Driver
# spring.jpa.database-platform=\
#   org.hibernate.dialect.H2Dialect

# -----------------------------------------
# Redis — on-prem sticky session cache
# -----------------------------------------
docpipeline.redis.host=\
  settle-cache-01.internal
docpipeline.redis.port=6379
docpipeline.redis.database=2
spring.data.redis.host=\
  ${docpipeline.redis.host}
spring.data.redis.port=\
  ${docpipeline.redis.port}
spring.data.redis.database=\
  ${docpipeline.redis.database}
spring.data.redis.timeout=5000

# -----------------------------------------
# Apache Camel — file-based routing
# -----------------------------------------
camel.springboot.name=ubs-doc-pipeline
camel.springboot.main-run-controller=true

# -----------------------------------------
# Filesystem directories
# -----------------------------------------
docpipeline.dirs.incoming=\
  /opt/ubs/incoming-docs
docpipeline.dirs.processed=\
  /opt/ubs/processed
docpipeline.dirs.reports=\
  /opt/ubs/reports
docpipeline.dirs.locks=\
  /opt/ubs/locks

# NFS mount point for upstream systems
docpipeline.dirs.nfs-incoming=\
  /mnt/shared-docs/incoming

# -----------------------------------------
# SOAP Compliance Service
# -----------------------------------------
docpipeline.compliance.soap-url=\
  http://10.192.4.47:8080\
  /compliance-api/v1/validate

# -----------------------------------------
# Native library (libpdf_ubs.so)
# -----------------------------------------
docpipeline.native.lib-path=\
  /usr/local/lib
docpipeline.native.lib-name=pdf_ubs

# -----------------------------------------
# Processing settings
# -----------------------------------------
docpipeline.cache.prefix=\
  docpipeline:state:
docpipeline.cache.ttl-hours=24

# -----------------------------------------
# Actuator
# -----------------------------------------
management.endpoints.web.exposure.include=\
  health,info,metrics
management.endpoint.health.show-details=\
  always

# -----------------------------------------
# Logging — forwarded to Splunk via rsyslog
# -----------------------------------------
logging.level.com.ubs.docpipeline=INFO
logging.level.org.apache.camel=WARN
logging.file.name=\
  /var/log/ubs/doc-pipeline.log
