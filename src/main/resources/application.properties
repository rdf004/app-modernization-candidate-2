# =============================================
# UBS Document Processing Pipeline
# Modernized for RHEL 10 — Java 21,
# Spring Boot 3.3, Camel 4.8
# =============================================

server.port=8443
spring.application.name=\
  doc-processing-pipeline

# ------------------------------------------
# Oracle Audit Database (production profile)
# ------------------------------------------
spring.datasource.url=\
  jdbc:oracle:thin:@${oracle.host:\
  ora-auditdb-01.internal}\
  :${oracle.port:1521}\
  :${oracle.sid:UBSAUDIT}
spring.datasource.username=\
  ${oracle.username:doc_pipeline}
spring.datasource.password=\
  ${ORACLE_DB_PASSWORD:}
spring.datasource.driver-class-name=\
  oracle.jdbc.OracleDriver
spring.jpa.database-platform=\
  org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate

# ------------------------------------------
# Redis
# ------------------------------------------
spring.redis.host=\
  ${REDIS_HOST:settle-cache-01.internal}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.database=${REDIS_DB:2}
spring.redis.timeout=5000

# ------------------------------------------
# Apache Camel
# ------------------------------------------
camel.springboot.name=ubs-doc-pipeline
camel.springboot.main-run-controller=true

# ------------------------------------------
# Filesystem directories
# ------------------------------------------
app.dirs.incoming=\
  ${DOC_INCOMING:/opt/ubs/incoming-docs}
app.dirs.processed=\
  ${DOC_PROCESSED:/opt/ubs/processed}
app.dirs.reports=\
  ${DOC_REPORTS:/opt/ubs/reports}
app.dirs.locks=\
  ${DOC_LOCKS:/opt/ubs/locks}
app.dirs.nfs-incoming=\
  ${DOC_NFS:/mnt/shared-docs/incoming}

# ------------------------------------------
# SOAP Compliance Service
# ------------------------------------------
compliance.soap.url=\
  ${COMPLIANCE_URL:\
  http://10.192.4.47:8080\
  /compliance-api/v1/validate}

# ------------------------------------------
# Native library
# ------------------------------------------
app.native.lib-path=\
  ${NATIVE_LIB_PATH:/usr/local/lib}
app.native.lib-name=pdf_ubs

# ------------------------------------------
# Actuator
# ------------------------------------------
management.endpoints.web.exposure.include=\
  health,info,metrics
management.endpoint.health.show-details=\
  always

# ------------------------------------------
# Logging
# ------------------------------------------
logging.level.com.ubs.docpipeline=INFO
logging.level.org.apache.camel=WARN
logging.file.name=\
  ${LOG_FILE:/var/log/ubs/doc-pipeline.log}
