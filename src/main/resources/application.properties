# =============================================
# UBS Document Processing Pipeline
# RHEL 7 on-prem deployment configuration
# =============================================

server.port=8443
spring.application.name=doc-processing-pipeline

# ------------------------------------------
# Oracle Audit Database
# Host: ora-auditdb-01.internal:1521
# ------------------------------------------
spring.datasource.url=\
  jdbc:oracle:thin:@ora-auditdb-01.internal\
  :1521:UBSAUDIT
spring.datasource.username=doc_pipeline
spring.datasource.password=${ORACLE_DB_PASSWORD}
spring.datasource.driver-class-name=\
  oracle.jdbc.OracleDriver
spring.jpa.database-platform=\
  org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.ddl-auto=validate

# ------------------------------------------
# H2 fallback for local development
# Activate via: --spring.profiles.active=dev
# ------------------------------------------
# spring.datasource.url=jdbc:h2:mem:auditdb
# spring.datasource.driver-class-name=\
#   org.h2.Driver
# spring.jpa.database-platform=\
#   org.hibernate.dialect.H2Dialect

# ------------------------------------------
# Redis — on-prem sticky session cache
# Host: settle-cache-01.internal:6379
# ------------------------------------------
spring.redis.host=settle-cache-01.internal
spring.redis.port=6379
spring.redis.database=2
spring.redis.timeout=5000

# ------------------------------------------
# Apache Camel — file-based routing
# ------------------------------------------
camel.springboot.name=ubs-doc-pipeline
camel.springboot.main-run-controller=true

# ------------------------------------------
# Filesystem directories (RHEL host-local)
# ------------------------------------------
app.dirs.incoming=/opt/ubs/incoming-docs
app.dirs.processed=/opt/ubs/processed
app.dirs.reports=/opt/ubs/reports
app.dirs.locks=/opt/ubs/locks

# NFS mount point for upstream systems
app.dirs.nfs-incoming=/mnt/shared-docs/incoming

# ------------------------------------------
# SOAP Compliance Service (hardcoded IP)
# Owned by Compliance team — no migration
# ------------------------------------------
compliance.soap.url=\
  http://10.192.4.47:8080\
  /compliance-api/v1/validate

# ------------------------------------------
# Native library (libpdf_ubs.so)
# ------------------------------------------
app.native.lib-path=/usr/local/lib
app.native.lib-name=pdf_ubs

# ------------------------------------------
# Actuator
# ------------------------------------------
management.endpoints.web.exposure.include=\
  health,info,metrics
management.endpoint.health.show-details=always

# ------------------------------------------
# Logging — forwarded to Splunk via rsyslog
# ------------------------------------------
logging.level.com.ubs.docpipeline=INFO
logging.level.org.apache.camel=WARN
logging.file.name=\
  /var/log/ubs/doc-pipeline.log
